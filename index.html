<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>덕고치</title>
<style>
  :root{
    --ink: #16352f;
    --ink-soft: rgba(22,53,47,0.62);
    --coral: #ff8a5b;
    --panel-bg: #fbfdfa;
    --panel-shadow: rgba(15,40,35,0.28);
  }
  html, body{
    margin: 0; padding: 0; width: 100vw; height: 100vh;
    overflow: hidden; background: transparent;
    -webkit-user-select: none; user-select: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    color: var(--ink);
  }
  .hit{ pointer-events: auto; }

  #xpHud{
    position: fixed;
    font-size: 12px; font-weight: 700; color: var(--coral);
    background: rgba(255,138,91,0.14);
    padding: 6px 11px; border-radius: 999px; cursor: pointer;
    box-shadow: 0 2px 8px rgba(15,40,35,0.12);
    transition: transform 0.15s ease;
  }
  #xpHud.bump{ transform: scale(1.18); }
  #quitBtn{
    position: fixed; top: 12px; right: 12px;
    min-width: 30px; height: 30px; padding: 0 10px; border-radius: 999px;
    background: rgba(255,255,255,0.75); box-shadow: 0 2px 8px rgba(15,40,35,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; cursor: pointer;
  }

  #duckHit{
    position: fixed; width: 190px; height: 190px;
    cursor: grab; pointer-events: auto;
  }
  #duckHit.grabbing{ cursor: grabbing; }
  #duckSvg{ width: 100%; height: 100%; display: block; overflow: visible; }

  #quack{
    position: fixed; transform: translate(-50%, 0);
    background: #fff; color: var(--ink); font-size: 13px; font-weight: 700;
    padding: 4px 10px; border-radius: 999px; box-shadow: 0 4px 10px rgba(22,64,54,0.18);
    opacity: 0; pointer-events: none; white-space: nowrap;
  }

  #chatBubble{
    position: fixed; width: 296px; box-sizing: border-box;
    background: var(--panel-bg); border-radius: 18px;
    box-shadow: 0 14px 34px var(--panel-shadow);
    padding: 12px 14px; display: flex; flex-direction: column; gap: 8px;
    opacity: 0; transform: scale(0.92) translateY(6px);
    transition: opacity 0.16s ease, transform 0.16s cubic-bezier(.2,.9,.3,1.2);
    pointer-events: none;
  }
  #chatBubble.open{ opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
  #chatBubble::after{
    content: ""; position: absolute; left: 50%; bottom: -9px; transform: translateX(-50%);
    border-left: 9px solid transparent; border-right: 9px solid transparent;
    border-top: 9px solid var(--panel-bg);
  }
  #chatBubble.below::after{
    bottom: auto; top: -9px;
    border-top: none; border-bottom: 9px solid var(--panel-bg);
  }
  #closeBtn{
    position: absolute; top: 8px; right: 8px;
    border: none; background: rgba(22,53,47,0.08); color: var(--ink);
    width: 21px; height: 21px; border-radius: 50%; font-size: 10.5px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #msgArea{ font-size: 13.5px; line-height: 1.5; padding-right: 20px; min-height: 20px; }

  /* the full transcript lives in the settings "대화내역" tab, not the bubble */
  #historyLog{
    display: flex; flex-direction: column; gap: 7px;
    max-height: 320px; overflow-y: auto; overflow-x: hidden; padding-right: 4px;
    scrollbar-width: thin; scrollbar-color: rgba(22,53,47,0.25) transparent;
  }
  #historyLog::-webkit-scrollbar{ width: 6px; }
  #historyLog::-webkit-scrollbar-thumb{ background: rgba(22,53,47,0.2); border-radius: 3px; }
  #historyLog:empty::before{ content: "아직 나눈 대화가 없어."; color: var(--ink-soft); font-size: 12px; }
  .msg{
    font-size: 13px; line-height: 1.5; padding: 7px 10px; border-radius: 13px;
    max-width: 88%; white-space: pre-wrap; word-break: break-word;
  }
  .msg.user{ align-self: flex-end; background: #d8f0e4; color: var(--ink); border-bottom-right-radius: 4px; }
  .msg.duck{ align-self: flex-start; background: #f2faf6; color: var(--ink); border-bottom-left-radius: 4px; }
  #resetHistoryBtn{
    align-self: flex-start; border: none; background: rgba(190,18,60,0.10); color: #be123c;
    border-radius: 12px; padding: 9px 12px; font-size: 12.5px; font-weight: 700; cursor: pointer;
  }
  #resetHistoryBtn:hover{ background: rgba(190,18,60,0.18); }

  #problem{
    border: none; border-top: 1px solid rgba(22,53,47,0.12);
    padding: 9px 0 0; font-size: 13.5px; font-family: inherit; color: var(--ink);
    background: transparent; outline: none;
  }

  /* a separate "thought bubble" (cloud + trailing dots leading back to the
     duck) for link suggestions, distinct from the main speech bubble */
  #thoughtBubble{
    position: fixed; width: 208px; box-sizing: border-box;
    background: #fff;
    border-radius: 46% 54% 58% 42% / 55% 48% 55% 42%;
    box-shadow: 0 10px 26px var(--panel-shadow);
    padding: 16px 17px 13px; display: flex; flex-direction: column; gap: 6px;
    opacity: 0; transform: scale(0.8);
    transition: opacity 0.18s ease, transform 0.18s cubic-bezier(.2,.9,.3,1.2);
    pointer-events: none;
  }
  #thoughtBubble.open{ opacity: 1; transform: scale(1); pointer-events: auto; }
  #thoughtBubble::before, #thoughtBubble::after{
    content: ""; position: absolute; background: #fff; border-radius: 50%;
  }
  #thoughtBubble::before{ width: 30px; height: 30px; top: -12px; left: 20px; }
  #thoughtBubble::after{ width: 22px; height: 22px; top: -7px; right: 30px; }
  #thoughtBubble .tt-label{ font-size: 11px; color: var(--ink-soft); font-weight: 700; }
  #thoughtBubble a{
    display: flex; align-items: center; gap: 8px; text-decoration: none;
    color: var(--ink); background: #f2faf6; border-radius: 10px; padding: 6px 8px;
  }
  #thoughtBubble a img{ width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0; background: #fff; }
  #thoughtBubble a span{ font-size: 12px; font-weight: 600; }

  .thoughtDot{
    position: fixed; background: #fff; border-radius: 50%;
    box-shadow: 0 3px 8px rgba(15,40,35,0.12);
    opacity: 0; transition: opacity 0.15s ease; pointer-events: none;
  }
  .thoughtDot.open{ opacity: 1; }

  /* settings — right click the duck. Centered via JS on whichever monitor
     the duck is currently on (not the whole multi-monitor canvas) */
  #settingsOverlay{
    position: fixed; inset: 0; background: rgba(15,40,35,0.32);
    opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
  }
  #settingsOverlay.open{ opacity: 1; pointer-events: auto; }
  #settingsPanel{
    position: fixed; left: 50%; top: 50%;
    width: min(420px, 92vw); background: var(--panel-bg); border-radius: 20px;
    box-shadow: 0 20px 50px var(--panel-shadow); padding: 18px;
    box-sizing: border-box; display: flex; flex-direction: column; gap: 12px;
    transform: translate(-50%, -50%) scale(0.95);
    transition: transform 0.2s cubic-bezier(.2,.9,.3,1.2);
  }
  #settingsPanel.customizeMode{ width: min(680px, 94vw); }
  #settingsOverlay.open #settingsPanel{ transform: translate(-50%, -50%) scale(1); }
  #settingsHead{ display: flex; align-items: center; justify-content: space-between; }
  #settingsHead h1{ font-size: 15px; margin: 0; font-weight: 800; }
  /* shared style for the settings ✕ close button (the old provider-picker
     buttons were replaced by #providerSelect) */
  .providerBtn{
    border: 1px solid rgba(22,53,47,0.15); background: #fff; color: var(--ink);
    border-radius: 12px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .settingsLabel{ font-size: 11.5px; color: var(--ink-soft); }
  #providerSelect{
    width: 100%; box-sizing: border-box;
    border: 1px solid rgba(22,53,47,0.15); border-radius: 12px; padding: 10px;
    font-size: 13px; font-weight: 700; font-family: inherit; color: var(--ink);
    background: #fff; outline: none; cursor: pointer;
  }
  #providerSelect:focus{ border-color: var(--coral); }
  #apiFields{
    display: flex; flex-direction: column; gap: 7px;
    padding: 11px; border: 1px solid rgba(22,53,47,0.12); border-radius: 14px;
    background: rgba(255,255,255,0.7);
  }
  .apiInput{
    width: 100%; box-sizing: border-box;
    border: 1px solid rgba(22,53,47,0.15); border-radius: 10px; padding: 9px 11px;
    font-size: 12.5px; font-family: inherit; color: var(--ink); background: #fff; outline: none;
  }
  .apiInput:focus{ border-color: var(--coral); }
  #autoCloseRow{ display: flex; align-items: center; gap: 10px; }
  #autoCloseRange{ flex: 1; accent-color: var(--coral); cursor: pointer; }

  #tabRow{ display: flex; gap: 8px; border-bottom: 1px solid rgba(22,53,47,0.1); padding-bottom: 10px; }
  .tabBtn{
    border: none; background: transparent; color: var(--ink-soft);
    font-size: 13px; font-weight: 700; padding: 6px 4px; cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  .tabBtn.active{ color: var(--ink); border-bottom-color: var(--coral); }
  #xpBadge{
    font-size: 10.5px; font-weight: 700; color: var(--coral);
    background: rgba(255,138,91,0.12); border-radius: 999px; padding: 2px 7px; margin-left: 4px;
  }
  .tabPane{ display: flex; flex-direction: column; gap: 12px; }

  #equipmentShell{
    display: flex; flex-direction: column; gap: 10px;
    max-height: 70vh;
  }
  #equipmentBoardTitle{
    display: flex; justify-content: space-between; align-items: center;
    color: var(--ink); font-size: 12px; font-weight: 800;
  }
  /* 메이플스토리 장비창처럼: 가운데 실시간 미리보기 + 양옆에 부위 슬롯 */
  #equipmentWheel{
    display: grid; grid-template-columns: 76px 1fr 76px; grid-template-rows: 250px;
    gap: 8px; padding: 10px; border-radius: 16px;
    border: 1px solid rgba(22,53,47,0.12);
    background:
      linear-gradient(rgba(255,255,255,0.68), rgba(255,255,255,0.68)),
      repeating-linear-gradient(135deg, #f3ead6 0 8px, #eee1c6 8px 16px);
  }
  .slotColumn{
    display: flex; flex-direction: column; gap: 6px;
    max-height: 250px; overflow-y: auto; padding-right: 1px;
  }
  #equipmentPreview{
    border-radius: 14px; overflow: hidden;
    border: 1px solid rgba(22,53,47,0.1);
    background: radial-gradient(ellipse at 50% 38%, rgba(255,255,255,0.95), rgba(255,255,255,0.4) 74%);
  }
  #previewSvg{ width: 100%; height: 100%; display: block; overflow: visible; }
  .equipmentSlot{
    min-height: 52px; flex-shrink: 0; border: 1px solid rgba(22,53,47,0.15); border-radius: 11px;
    background: rgba(255,255,255,0.85); color: var(--ink); cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.6);
    padding: 4px 2px;
  }
  .equipmentSlot:hover{ border-color: rgba(255,138,91,0.7); }
  .equipmentSlot.selected{ border-color: var(--coral); box-shadow: inset 0 0 0 2px rgba(255,138,91,0.22); }
  .equipmentSlot .slotIcon{ font-size: 16px; line-height: 1; }
  .equipmentSlot .slotName{ font-size: 8px; font-weight: 800; }
  .equipmentSlot .slotLevel{ font-size: 7.5px; color: var(--ink-soft); }
  #equipmentDetail{
    overflow-y: auto; padding: 14px; border-radius: 16px;
    border: 1px solid rgba(22,53,47,0.12); background: #fff;
  }
  #equipmentDetailHead{ display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  #equipmentDetailHead strong{ font-size: 15px; }
  #equipmentDetailHead span{ font-size: 10.5px; color: var(--ink-soft); }
  .equipmentSectionLabel{ margin: 12px 0 7px; font-size: 10.5px; font-weight: 800; color: var(--ink-soft); }
  #skinChoiceGrid{ display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 7px; }
  .skinChoice{
    min-height: 58px; padding: 7px 5px; border: 1px solid rgba(22,53,47,0.13); border-radius: 11px;
    background: #f5faf7; color: var(--ink); cursor: pointer; font-size: 10px; font-weight: 700;
    display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px;
  }
  .skinChoice .skinIcon{ font-size: 18px; }
  .skinChoice.selected{ border: 2px solid var(--ink); background: #fff8ed; }
  .skinChoice.locked{ opacity: 0.42; cursor: default; filter: grayscale(0.8); }
  #equipmentColorRow{ display: flex; flex-wrap: wrap; gap: 7px; }
  .colorSwatch{
    width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid rgba(22,53,47,0.15); cursor: pointer;
  }
  .colorSwatch.selected{ border-color: var(--ink); border-width: 2.5px; }
  .unlockBtn{
    align-self: flex-start; border: none; background: rgba(22,53,47,0.08); color: var(--ink);
    font-size: 11px; font-weight: 700; padding: 6px 10px; border-radius: 999px; cursor: pointer;
  }
  .unlockBtn:disabled{ opacity: 0.4; cursor: default; }
  .unlockBtn.maxed{ background: rgba(255,138,91,0.15); color: var(--coral); }
  #promptArea{
    width: 100%; min-height: 130px; resize: vertical; box-sizing: border-box;
    border: 1px solid rgba(22,53,47,0.15); border-radius: 12px; padding: 10px;
    font-size: 12.5px; line-height: 1.5; font-family: inherit; color: var(--ink);
    background: #fff; outline: none;
  }
  #promptArea:focus{ border-color: var(--coral); }
  #adminPanel{
    display: flex; flex-direction: column; gap: 8px;
    padding: 12px; border: 1px dashed rgba(22,53,47,0.16); border-radius: 14px;
    background: rgba(255,255,255,0.7);
  }
  #adminRow{ display: flex; gap: 8px; }
  #adminCodeInput{
    flex: 1; border: 1px solid rgba(22,53,47,0.15); border-radius: 12px;
    padding: 10px 12px; font-size: 13px; font-family: inherit; color: var(--ink);
    background: #fff; outline: none;
  }
  #adminCodeInput:focus{ border-color: var(--coral); }
  #adminApplyBtn, #resetUnlockBtn{
    border: none; border-radius: 12px; padding: 10px 13px;
    font-size: 12.5px; font-weight: 700; cursor: pointer;
  }
  #adminApplyBtn{
    background: var(--ink); color: #fff; white-space: nowrap;
  }
  #resetUnlockBtn{
    background: rgba(255,138,91,0.14); color: var(--coral);
  }
  #settingsBtns{ display: flex; gap: 8px; }
  #resetPromptBtn{
    border: none; background: rgba(22,53,47,0.08); color: var(--ink);
    border-radius: 12px; padding: 10px 13px; font-size: 12.5px; font-weight: 700; cursor: pointer;
  }
  #saveSettingsBtn{
    flex: 1; border: none; background: var(--ink); color: #fff;
    border-radius: 12px; padding: 10px 13px; font-size: 13px; font-weight: 700; cursor: pointer;
  }

  #codePanel{
    display: flex; flex-direction: column; gap: 10px;
    padding: 12px; border: 1px solid rgba(22,53,47,0.12);
    border-radius: 16px; background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(242,250,246,0.92));
  }
  #codePanel.locked{
    opacity: 0.72;
  }
  #codePanelHeader{
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  #codePanelHeader strong{
    font-size: 13px;
  }
  #codeStatus{
    font-size: 11px; color: var(--ink-soft);
  }
  #duckCodeArea{
    width: 100%; min-height: 148px; resize: vertical; box-sizing: border-box;
    border: 1px solid rgba(22,53,47,0.15); border-radius: 12px; padding: 10px;
    font-size: 12px; line-height: 1.45; font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    color: var(--ink); background: #fff; outline: none;
  }
  #duckCodeArea:focus{ border-color: var(--coral); }
  #codeBtns{ display: flex; gap: 8px; }
  #applyDuckCodeBtn, #loadDuckCodeBtn{
    border: none; border-radius: 12px; padding: 10px 13px;
    font-size: 12.5px; font-weight: 700; cursor: pointer;
  }
  #applyDuckCodeBtn{
    flex: 1; background: var(--coral); color: #fff;
  }
  #loadDuckCodeBtn{
    background: rgba(22,53,47,0.08); color: var(--ink);
  }

  @media (max-width: 620px){
    #equipmentWheel{ grid-template-columns: 1fr; }
    #equipmentPreview{ order: -1; min-height: 160px; }
    .slotColumn{ flex-direction: row; flex-wrap: wrap; max-height: none; overflow-y: visible; }
  }

  @media (prefers-reduced-motion: reduce){
    #chatBubble, #thoughtBubble, #settingsOverlay, #settingsPanel{ transition: none; }
  }
</style>
</head>
<body>

<div id="xpHud" class="hit" title="우클릭해서 파츠 커스터마이징">✨ 0 XP</div>
<div id="quitBtn" class="hit" title="종료 (Ctrl+Shift+Q)">종료</div>
<div id="duckHit" class="hit"><svg id="duckSvg" viewBox="-100 -100 200 200"></svg></div>
<div id="quack">꽥!</div>

<div id="chatBubble" class="hit">
  <button id="closeBtn">✕</button>
  <div id="msgArea">막힌 걸 말해봐.</div>
  <input id="problem" type="text" placeholder="오리한테 말해봐... (Enter)">
</div>

<div id="thoughtDot1" class="thoughtDot"></div>
<div id="thoughtDot2" class="thoughtDot"></div>
<div id="thoughtDot3" class="thoughtDot"></div>
<div id="thoughtBubble" class="hit">
  <div class="tt-label">💭 이런 게 생각나네</div>
  <div id="thoughtLinks"></div>
</div>

<div id="settingsOverlay" class="hit">
  <div id="settingsPanel" class="hit">
    <div id="settingsHead">
      <h1 id="settingsTitle">오리 설정</h1>
      <button id="settingsCloseBtn" class="providerBtn" style="flex:none;width:30px;height:30px;padding:0;border-radius:50%;">✕</button>
    </div>
    <div id="tabRow">
      <button class="tabBtn active" data-tab="settings">설정</button>
      <button class="tabBtn" data-tab="history">대화내역</button>
      <button class="tabBtn" data-tab="customize">커스텀 <span id="xpBadge">0 XP</span></button>
    </div>

    <div id="tabSettings" class="tabPane">
      <div class="settingsLabel">어떤 AI로 오리와 대화할까</div>
      <select id="providerSelect" class="hit">
        <optgroup label="내 컴퓨터 CLI (키 불필요)">
          <option value="claude">Claude Code (CLI)</option>
          <option value="codex">Codex (CLI)</option>
        </optgroup>
        <optgroup label="API 키로 연결">
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic (API)</option>
          <option value="gemini">Google Gemini</option>
          <option value="openrouter">OpenRouter</option>
          <option value="groq">Groq</option>
          <option value="xai">xAI (Grok)</option>
        </optgroup>
        <optgroup label="로컬 서버 (키 불필요)">
          <option value="ollama">Ollama (로컬)</option>
          <option value="lmstudio">LM Studio (로컬)</option>
        </optgroup>
        <optgroup label="직접 입력">
          <option value="custom">커스텀 (OpenAI 호환)</option>
        </optgroup>
      </select>
      <div id="apiFields" style="display:none;">
        <input id="apiBaseUrl" class="apiInput" type="text" spellcheck="false" placeholder="연결 주소 (Base URL)" />
        <input id="apiModel" class="apiInput" type="text" spellcheck="false" placeholder="모델 이름" />
        <input id="apiKeyInput" class="apiInput" type="password" autocomplete="off" placeholder="API 키" />
        <div class="settingsLabel" id="apiHint"></div>
      </div>
      <div class="settingsLabel">대화창 자동 닫힘 (마지막 조작 후) — <span id="autoCloseVal">5초</span></div>
      <div id="autoCloseRow">
        <input id="autoCloseRange" type="range" min="0" max="30" step="1" value="5">
      </div>
      <div class="settingsLabel">오리 기본 성격은 이미 적용돼 있어. 추가로 시키고 싶은 게 있으면 여기에 (비워두면 기본 성격 그대로)</div>
      <textarea id="promptArea" placeholder="예: 답변을 더 짧게 해줘 / 파이썬 위주로 조언해줘 ..."></textarea>
      <div id="settingsBtns">
        <button id="resetPromptBtn">비우기</button>
        <button id="saveSettingsBtn">저장하고 닫기</button>
      </div>
      <div id="adminPanel">
        <div class="settingsLabel">쿠폰 입력</div>
        <div id="adminRow">
          <input id="adminCodeInput" type="text" placeholder="쿠폰 코드" autocomplete="off" spellcheck="false" />
          <button id="adminApplyBtn">적용</button>
        </div>
        <div class="settingsLabel" id="adminHint">쿠폰 코드를 입력해봐.</div>
        <button id="resetUnlockBtn">해금 초기화</button>
      </div>
    </div>

    <div id="tabHistory" class="tabPane" style="display:none;">
      <div class="settingsLabel">오리랑 나눈 대화 (아래로 갈수록 최근)</div>
      <div id="historyLog"></div>
      <button id="resetHistoryBtn">대화 기록 초기화</button>
    </div>

    <div id="tabCustomize" class="tabPane" style="display:none;">
      <div class="settingsLabel">질문하거나 오리를 더블클릭하면 XP가 쌓여. 스킨 트랙을 성장시켜 오리에게 의상과 장식을 겹쳐 입혀봐.</div>
      <div id="equipmentShell">
        <div id="equipmentBoardTitle"><span>오리 장비</span><span id="equipmentCount">0/0</span></div>
        <div id="equipmentWheel">
          <div id="equipmentSlotsLeft" class="slotColumn"></div>

    " Q " + (cx - r2) + " " + (cy + r2) + " " + (cx - r) + " " + cy +

// ---------------------------------------------------------------------

  // duckHit's on-screen box only moves once per rendered frame (physicsFrame's
  // rAF), while raw mousemove during a fast fling/shake can outrun that by a
  // wide margin. Re-checking elementFromPoint against that stale box here could

  // click-through — which then swallows the eventual pointerup and leaves

  // already know the window must stay interactive, so skip re-evaluating.
  if (dragging) return;

  // region inside it — its empty corners would otherwise swallow clicks meant

  if (interactive && el.closest("#duckHit")){

    const dy = (y - renderY) / DUCK_HIT_RY;

function trackMax(def){ return Math.max(0, def.skins.length - 1); }

  if (typeof value === "number" && Number.isFinite(value)) return value;

const SKIN_TEMPLATE = { palette: { primary: "#ffcf4a", belly: "#fff0bd", accent: "#ff8a5b" } };

// current chosen skin value + any color override, per track — this is the

function buildDuckStyle(){

    palette: { primary: 0xffcb3d, belly: 0xfff2b8, accent: 0xff8a5b, shadow: 0xe2aa2d, ink: 0x221d18, blush: 0xff9a82, trim: 0xffffff },
    parts: {}, partColors: {}

    const st = partOf(def.id);

function drawEye(g, val, c, pupil, side){

  else if (val === "tiny") wg.appendChild(ellipse(0, 0, 7, 13, hexCss(c)));
  else wg.appendChild(ellipse(0, 0, 11, 22, hexCss(c)));
  wg.setAttribute("transform", "translate(" + cx + " " + cy + ") rotate(" + (side * 14) + ")");
  g.appendChild(wg);
  return wg;
}
function drawLeg(g, val, c, side){
  const h = val === "short" ? 13 : 18;
  const cy = BODY_CY + 42 + h / 2;
  g.appendChild(rrect(side * 15, cy, 7, h, 3.5, hexCss(c)));
  if (val === "sock") g.appendChild(rrect(side * 15, cy + h / 2 - 3, 8, 7, 3, "#fff"));
  if (val === "boot") g.appendChild(rrect(side * 15, cy + h / 2 + 1, 10, 8, 3, "#4a4038"));
}
function drawFoot(g, val, c, side){

  else g.appendChild(ellipse(cx, cy, 10, 5.5, hexCss(c), side * 8));

const FINISH_DEFS = {}; // per-svg <defs> filter cache, keyed by svg element
function ensureFinishDefs(svgEl){
  if (FINISH_DEFS[svgEl.id]) return FINISH_DEFS[svgEl.id];
  const defs = sv("defs", {});
  const glow = sv("filter", { id: svgEl.id + "-glow", x: "-60%", y: "-60%", width: "220%", height: "220%" });
  glow.appendChild(sv("feGaussianBlur", { stdDeviation: 4, result: "blur" }));
  const merge = sv("feMerge", {});
  merge.appendChild(sv("feMergeNode", { in: "blur" }));
  merge.appendChild(sv("feMergeNode", { in: "SourceGraphic" }));
  glow.appendChild(merge);
  defs.appendChild(glow);
  svgEl.appendChild(defs);
  FINISH_DEFS[svgEl.id] = { glowId: svgEl.id + "-glow" };
  return FINISH_DEFS[svgEl.id];
}
// "재질" doesn't get its own silhouette — it's a finish applied on top of
// the whole duck, same spirit as the old PBR material but expressed as
// plain SVG (highlight ellipse / gradient sheen / glow), so it can never
// hit the "PBR material with no environment map" trap that broke the 3D version
function applyFinish(svgEl, root, val, accentColor){
  if (val === "gloss" || val === "pearl" || val === "iridescent"){
    const shine = ellipse(-14, BODY_CY - 20, 16, 10, "#ffffff");
    shine.setAttribute("opacity", val === "pearl" ? "0.5" : "0.38");
    root.appendChild(shine);
  }
  if (val === "neon"){
    const defs = ensureFinishDefs(svgEl);
    root.setAttribute("filter", "url(#" + defs.glowId + ")");
    const ring = sv("ellipse", { cx: 0, cy: BODY_CY, rx: 50, ry: 44, fill: "none", stroke: hexCss(accentColor), "stroke-width": 3, opacity: 0.55 });
    root.appendChild(ring);
  } else {
    root.removeAttribute("filter");
  }
}

const partEls = {}; // trackId -> <g>, populated by the last renderDuck() call on the MAIN duck only
function renderDuck(svgEl, style, trackMeshes){
  clearEl(svgEl);
  const root = sv("g", { id: "duckRoot" });
  svgEl.appendChild(root);

  // draw order back-to-front: decorations behind, then legs, body, outfit,
  // wings, head/face, blush, crest, feet on top
  const order = ["back", "tail", "legL", "legR", "body", "outfit", "wingL", "wingR", "head", "bill", "eyeL", "eyeR", "blush", "crest", "footL", "footR"];
  order.forEach((id) => {
    const g = sv("g", { "data-track": id });
    const drawer = PART_DRAWERS[id];
    const color = id === "eyeL" || id === "eyeR" ? partColor(style, id, style.palette.ink)
      : id === "bill" || id === "legL" || id === "legR" || id === "footL" || id === "footR" || id === "tail" ? partColor(style, id, style.palette.accent)
      : id === "wingL" || id === "wingR" ? partColor(style, id, style.palette.shadow)
      : id === "blush" ? partColor(style, id, style.palette.blush)
      : partColor(style, id, style.palette.primary);
    if (drawer){
      // every drawer receives the color as a raw number and calls hexCss()
      // itself where a string is actually needed — passing an already-
      // stringified color into a drawer that also calls hexCss() on it
      // corrupts it (hexCss("#ff8a5b") coerces the string to NaN -> black)
      drawer(g, style.parts[id], color, style.palette.ink);
    }
    root.appendChild(g);
    if (trackMeshes) partEls[id] = g;
  });

  // belly patch — always drawn, not a track (see CHANGELOG §13 for why it's
  // small: a large full circle here reads as "a second ball stuck on")
  const belly = ellipse(0, BODY_CY + 10, 21, 15, hexCss(style.palette.belly));
  root.insertBefore(belly, root.querySelector('[data-track="outfit"]'));

  applyFinish(svgEl, root, style.parts.finish, style.palette.accent);
  return root;
}

function rebuildDuck(){
  const style = buildDuckStyle();
  renderDuck(duckSvg, style, true);
  if (settingsOverlay.classList.contains("open")) renderDuck(previewSvg, style, false);
}

// ---------------------------------------------------------------------
// fling-and-settle physics: drag the duck, throw it, it slides + bounces.
// spans every monitor (see main.js getVirtualBounds), so it can be dragged
// across a multi-monitor setup instead of stopping at one screen's edge
// ---------------------------------------------------------------------
const duckHit = document.getElementById("duckHit");
const duckSvg = document.getElementById("duckSvg");
const quackEl = document.getElementById("quack");
const HALF = 95;
// clickable ellipse hugging the duck inside its 190px box (see
// updateWindowHitTest): a bit narrower than tall since the duck is taller than
// wide, leaving the box corners click-through
const DUCK_HIT_RX = 78, DUCK_HIT_RY = 92;

let curX = W * 0.82, curY = H * 0.78;
let velX = 0, velY = 0;
let dragging = false, dragOffX = 0, dragOffY = 0;
let downAt = 0, downX = 0, downY = 0;
let prevX = curX, prevY = curY;
let bouncePulse = 0;
function triggerBounce(strength){ bouncePulse = Math.max(bouncePulse, strength); }

window.duckAPI.getHomeRect().then((r) => {
  if (!r) return;
  curX = r.x + r.width * 0.82;
  curY = r.y + r.height * 0.78;
  prevX = curX; prevY = curY;
});

function playTone(freq, dur, type, peak){
  try{
    const ctx = playTone._ctx || (playTone._ctx = new (window.AudioContext || window.webkitAudioContext)());
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(peak, ctx.currentTime + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.connect(gain).connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + dur + 0.02);
  } catch(e){}
}
function quackSound(){ playTone(360, 0.16, "sawtooth", 0.14); setTimeout(()=>playTone(300,0.12,"sawtooth",0.1), 70); }
function trillSound(){ playTone(520,0.07,"sawtooth",0.12); setTimeout(()=>playTone(420,0.07,"sawtooth",0.12),80); setTimeout(()=>playTone(520,0.07,"sawtooth",0.12),160); }
function whooshSound(){ playTone(220,0.22,"sine",0.1); playTone(480,0.18,"sine",0.08); }
function boingSound(){ playTone(180,0.24,"triangle",0.16); }

// a big grab-bag of distinct double-click reactions, picked at random
// (never the same one twice in a row). All of these are plain 2D
// scaleX/scaleY + rotate on #duckRoot — no depth axis, so there's no
// shearing failure mode to guard against like the old 3D squashGroup.
const EASE_OUT_3 = (p) => 1 - Math.pow(1 - p, 3);
const EASE_OUT_2 = (p) => 1 - Math.pow(1 - p, 2);
const PULSE = (p) => Math.sin(p * Math.PI);

const REACTIONS = {
  hop:        { dur: 0.5, sound: "quack", apply: (p) => ({ bobY: -PULSE(p) * 28, sX: 1 + PULSE(p) * 0.12, sY: 1 + PULSE(p) * 0.12 }) },
  tripleHop:  { dur: 0.8, sound: "trill", apply: (p) => { const s = Math.abs(Math.sin(p * Math.PI * 3)); return { bobY: -s * 24, sX: 1 + s * 0.1, sY: 1 + s * 0.1 }; } },
  spin:       { dur: 0.7, sound: "whoosh", apply: (p) => ({ rot: EASE_OUT_3(p) * 360 }) },
  bigBounce:  { dur: 0.45, sound: "boing", apply: (p) => ({ bobY: -PULSE(p) * 10, sX: 1 + PULSE(p) * 0.42, sY: 1 + PULSE(p) * 0.42 }) },
  wiggle:     { dur: 0.6, sound: "quack", apply: (p) => ({ rot: Math.sin(p * Math.PI * 9) * 14 * (1 - p) }) },
  barrelRoll: { dur: 0.8, sound: "whoosh", apply: (p) => ({ rot: EASE_OUT_2(p) * 360 }) },
  squishFlat: { dur: 0.5, sound: "boing", apply: (p) => { const s = PULSE(p); return { bobY: s * 10, sX: 1 + s * 0.4, sY: 1 - s * 0.38 }; } },
  stretchTall:{ dur: 0.5, sound: "quack", apply: (p) => { const s = PULSE(p); return { bobY: -s * 8, sX: 1 - s * 0.3, sY: 1 + s * 0.42 }; } },
  grow:       { dur: 0.6, sound: "whoosh", apply: (p) => { const s = 1 + PULSE(p) * 0.5; return { sX: s, sY: s }; } },
  shrink:     { dur: 0.5, sound: "trill", apply: (p) => { const s = 1 - PULSE(p) * 0.35; return { sX: s, sY: s }; } },
  jelly:      { dur: 1.0, sound: "boing", apply: (p) => { const decay = (1 - p); const w = Math.sin(p * Math.PI * 6) * decay * 0.3; return { sX: 1 + w, sY: 1 - w }; } },
  heartbeat:  { dur: 0.55, sound: "quack", apply: (p) => { const beat = Math.abs(Math.sin(p * Math.PI * 2.4)) * (1 - p * 0.3); const s = 1 + beat * 0.2; return { sX: s, sY: s }; } },
  sideSquish: { dur: 0.5, sound: "boing", apply: (p) => { const s = PULSE(p); return { sX: 1 - s * 0.3, sY: 1 + s * 0.16 }; } },
  dizzy:      { dur: 0.9, sound: "trill", apply: (p) => { const decay = (1 - p); return { rot: Math.sin(p * Math.PI * 4) * 26 * decay, sX: 1 + PULSE(p) * 0.14, sY: 1 + PULSE(p) * 0.14 }; } }
};
const REACTION_KEYS = Object.keys(REACTIONS);
let lastReaction = null;
let reaction = null;

function pickReaction(){
  if (REACTION_KEYS.length === 1) return REACTION_KEYS[0];
  let r;
  do { r = REACTION_KEYS[Math.floor(rand(0, REACTION_KEYS.length))]; } while (r === lastReaction);
  lastReaction = r;
  return r;
}

function popQuackBubble(text){
  quackEl.textContent = text || "꽥!";
  quackEl.style.left = curX + "px";
  quackEl.style.top = (curY - 70) + "px";
  quackEl.style.transition = "none";
  quackEl.style.opacity = "1";
  quackEl.style.transform = "translate(-50%,0) scale(0.7)";
  requestAnimationFrame(() => {
    quackEl.style.transition = "opacity 1.1s ease, transform 1.1s ease";
    quackEl.style.opacity = "0";
    quackEl.style.transform = "translate(-50%,-26px) scale(1)";
  });
}

function celebrateLevelUp(label){
  popQuackBubble("✨ " + label + " 레벨업!");
  triggerBounce(1);
  playTone(660, 0.1, "sine", 0.14);
  setTimeout(() => playTone(880, 0.12, "sine", 0.14), 90);
  setTimeout(() => playTone(1100, 0.16, "sine", 0.15), 180);
}

function playReactionSound(name){
  if (name === "quack") quackSound();
  else if (name === "trill") trillSound();
  else if (name === "whoosh") whooshSound();
  else if (name === "boing") boingSound();
}

function doReaction(){
  popQuackBubble();
  addXP(1);
  if (REDUCE){ triggerBounce(1); quackSound(); return; }

  const type = pickReaction();
  reaction = { type, start: performance.now() };
  triggerBounce(0.5);
  playReactionSound(REACTIONS[type].sound);
  if (type === "hop" || type === "bigBounce"){ velY -= 8; velX += rand(-2, 2); }
  else if (type === "tripleHop"){ velY -= 5; }
}

// tap = open the chat (after a short wait, in case a second tap turns it
// into a double-click); double-click = quack. Press-and-hold-still, then
// drag = rotate in place; a normal quick drag just moves the duck.
let clickTimer = null;
let holdMode = false;
let holdTimer = null;
let lastMoveX = 0, lastMoveY = 0;
let duckSpin = 0; // accumulated free rotation from hold-drag, degrees

duckHit.addEventListener("pointerdown", (e) => {
  duckHit.setPointerCapture(e.pointerId);
  duckHit.classList.add("grabbing");
  dragging = true;
  holdMode = false;
  downAt = performance.now(); downX = e.clientX; downY = e.clientY;
  lastMoveX = e.clientX; lastMoveY = e.clientY;
  dragOffX = e.clientX - curX; dragOffY = e.clientY - curY;
  clearTimeout(holdTimer);
  holdTimer = setTimeout(() => {
    if (dragging && Math.hypot(lastMoveX - downX, lastMoveY - downY) < 6) holdMode = true;
  }, 380);
});
duckHit.addEventListener("pointermove", (e) => {
  if (!dragging) return;
  lastMoveX = e.clientX; lastMoveY = e.clientY;
  if (holdMode){
    duckSpin += (e.movementX || 0) * 0.8;
    return;
  }
  if (Math.hypot(e.clientX - downX, e.clientY - downY) > 6) clearTimeout(holdTimer);
  curX = e.clientX - dragOffX;
  curY = e.clientY - dragOffY;
});
duckHit.addEventListener("pointerup", (e) => {
  dragging = false;
  clearTimeout(holdTimer);
  const wasHold = holdMode;
  holdMode = false;
  duckHit.classList.remove("grabbing");
  lastInteractive = null;
  requestAnimationFrame(() => updateWindowHitTest(e.clientX, e.clientY));
  if (wasHold) return;

  const dt = performance.now() - downAt;
  const moved = Math.hypot(e.clientX - downX, e.clientY - downY);
  if (dt < 260 && moved < 9){
    if (clickTimer){
      clearTimeout(clickTimer);
      clickTimer = null;
      doReaction();
    } else {
      clickTimer = setTimeout(() => { clickTimer = null; openChat(); }, 260);
    }
  }
});
duckHit.addEventListener("pointercancel", () => { dragging = false; holdMode = false; clearTimeout(holdTimer); duckHit.classList.remove("grabbing"); lastInteractive = null; });
// safety net: if pointer capture is ever released without a pointerup/pointercancel
// reaching us (e.g. the OS/browser force-releases it), don't stay stuck "grabbing"
duckHit.addEventListener("lostpointercapture", () => { dragging = false; holdMode = false; clearTimeout(holdTimer); duckHit.classList.remove("grabbing"); lastInteractive = null; });

const FRICTION = 0.965;
let t0 = performance.now();
let renderX = curX, renderY = curY;

function physicsFrame(now){
  if (dragging && !holdMode){
    velX = curX - prevX; velY = curY - prevY;
  } else if (!dragging) {
    velX *= FRICTION; velY *= FRICTION;
    curX += velX; curY += velY;

    if (curX < HALF){ curX = HALF; velX = Math.abs(velX) * 0.5; if (Math.abs(velX) > 0.6) triggerBounce(0.4); }
    if (curX > W - HALF){ curX = W - HALF; velX = -Math.abs(velX) * 0.5; if (Math.abs(velX) > 0.6) triggerBounce(0.4); }
    if (curY < HALF){ curY = HALF; velY = Math.abs(velY) * 0.5; if (Math.abs(velY) > 0.6) triggerBounce(0.4); }
    if (curY > H - HALF){ curY = H - HALF; velY = -Math.abs(velY) * 0.5; if (Math.abs(velY) > 0.6) triggerBounce(0.4); }
  } else {
    velX = 0; velY = 0;
  }
  prevX = curX; prevY = curY;

  const speed = Math.hypot(velX, velY);
  const idleBob = (!REDUCE && !dragging && speed < 0.12) ? Math.sin((now - t0) * 0.0014) * 3.5 : 0;
  renderX = curX; renderY = curY + idleBob;

  duckHit.style.left = (renderX - HALF) + "px";
  duckHit.style.top = (renderY - HALF) + "px";

  // XP 배지 — 오리 바로 아래를 따라다님
  const xpW = xpHud.offsetWidth || 70;
  xpHud.style.left = clamp(renderX - xpW / 2, 8, W - xpW - 8) + "px";
  xpHud.style.top = clamp(renderY + HALF + 10, 8, H - 34) + "px";

  const tiltAngle = Math.atan2(velY, velX || 0.0001) * (180 / Math.PI);

  bouncePulse *= REDUCE ? 0 : 0.86;
  const s = 1 + bouncePulse * 0.22;

  let reactBob = 0, reactRot = 0, sX = 1, sY = 1;
  if (reaction){
    const t = (now - reaction.start) / 1000;
    const def = REACTIONS[reaction.type];
    const dur = (def && def.dur) || 0.5;
    if (!def || t > dur){
      reaction = null;
    } else {
      const r = def.apply(t / dur);
      reactBob = r.bobY || 0;
      reactRot = r.rot || 0;
      sX = r.sX != null ? r.sX : 1;
      sY = r.sY != null ? r.sY : 1;
    }
  }
  if (REDUCE){ sX = 1; sY = 1; reactBob = 0; reactRot = 0; }

  const tilt = (REDUCE || holdMode) ? 0 : tiltAngle * 0.12;
  const rot = duckSpin + tilt + reactRot;
  const root = duckSvg.firstElementChild; // #duckRoot
  if (root){
    root.setAttribute("transform", "translate(0 " + reactBob + ") rotate(" + rot + ") scale(" + (s * sX) + " " + (s * sY) + ")");
    // 날개 파닥이기 — speed가 높을수록 더 빠르고 크게, 기본 자세 위에 더해짐
    const wingFlap = Math.sin((now - t0) * 0.006 * Math.max(1, speed * 0.3)) * Math.min(22, speed * 4);
    const wingCy = BODY_CY - 2;
    if (partEls.wingL) partEls.wingL.firstElementChild && partEls.wingL.firstElementChild.setAttribute("transform", "translate(-50 " + wingCy + ") rotate(" + (-14 - wingFlap * 0.6) + ")");
    if (partEls.wingR) partEls.wingR.firstElementChild && partEls.wingR.firstElementChild.setAttribute("transform", "translate(50 " + wingCy + ") rotate(" + (14 + wingFlap * 0.6) + ")");
  }

  if (chatBubble.classList.contains("open")) positionBubble();

  requestAnimationFrame(physicsFrame);
}

const thoughtDots = [
  document.getElementById("thoughtDot1"),
  document.getElementById("thoughtDot2"),
  document.getElementById("thoughtDot3")
];

function faviconFor(url){
  try{ return "https://www.google.com/s2/favicons?sz=64&domain=" + new URL(url).hostname; }
  catch(e){ return ""; }
}

function setThoughtOpen(open){
  thoughtBubble.classList.toggle("open", open);
  thoughtDots.forEach((d) => d.classList.toggle("open", open));
}

function renderLinks(links){
  thoughtLinks.innerHTML = "";
  if (!links || !links.length){ setThoughtOpen(false); return; }
  links.slice(0, 3).forEach((l) => {
    const a = document.createElement("a");
    a.href = l.url; a.target = "_blank"; a.rel = "noopener";
    const icon = faviconFor(l.url);
    a.innerHTML = (icon ? "<img src=\"" + icon + "\" alt=\"\">" : "") + "<span>" + l.label + "</span>";
    thoughtLinks.appendChild(a);
  });
  positionThought();
  setThoughtOpen(true);
}

function positionBubble(){
  const bw = chatBubble.offsetWidth || 296;
  const bh = chatBubble.offsetHeight || 140;
  const gap = 16;
  let below = (renderY - HALF - bh - gap) < 8;
  chatBubble.classList.toggle("below", below);
  chatBubble.style.transformOrigin = below ? "top center" : "bottom center";
  const top = below ? (renderY + HALF + gap) : (renderY - HALF - bh - gap);
  const left = clamp(renderX - bw / 2, 8, W - bw - 8);
  chatBubble.style.left = left + "px";
  chatBubble.style.top = clamp(top, 8, H - bh - 8) + "px";
  if (thoughtBubble.classList.contains("open")) positionThought();
}

function positionThought(){
  const tw = thoughtBubble.offsetWidth || 208;
  const th = thoughtBubble.offsetHeight || 90;

  // the trail always starts right at the duck's head, drifting up toward
  // whichever side of the screen has more room
  const side = renderX > W / 2 ? -1 : 1;
  const startX = renderX + side * HALF * 0.35;
  const startY = renderY - HALF * 0.85;

  let bx = startX + side * (tw * 0.5 + 34);
  let by = startY - th - 46;
  if (by < 8) by = startY + 30;
  bx = clamp(bx, 8, W - tw - 8);
  by = clamp(by, 8, H - th - 8);
  thoughtBubble.style.left = bx + "px";
  thoughtBubble.style.top = by + "px";

  const endX = bx + tw / 2 - side * (tw * 0.28);
  const endY = by + th - 6;
  const sizes = [10, 15, 21];
  for (let i = 0; i < thoughtDots.length; i++){
    const t = (i + 1) / (thoughtDots.length + 1);
    const dx = startX + (endX - startX) * t;
    const dy = startY + (endY - startY) * t;
    const s = sizes[i];
    thoughtDots[i].style.width = s + "px";
    thoughtDots[i].style.height = s + "px";
    thoughtDots[i].style.left = (dx - s / 2) + "px";
    thoughtDots[i].style.top = (dy - s / 2) + "px";
  }
}

// in-memory only: threads --resume within one app run so a chat keeps context
// across turns. Reset on provider/prompt change and on 새 대화 — deliberately NOT
// persisted across restart (resuming a stale CLI session between launches is
// unreliable; the visible transcript is what survives instead).
let sessionId = null;
let asking = false;

// the full chat transcript. Reopening the bubble no longer wipes it (that reset
// was the root cause of "대화내역이 날아간다" + felt-broken multi-turn), and it's
// persisted to localStorage so past conversations stay reviewable after a restart.
let convo = [];
try {
  const saved = JSON.parse(localStorage.getItem("duckConvo") || "[]");
  if (Array.isArray(saved)) convo = saved;
} catch (e) { convo = []; }

function saveConvo(){
  // don't persist the transient "…thinking" placeholder
  try { localStorage.setItem("duckConvo", JSON.stringify(convo.filter((m) => !m.pending).slice(-40))); } catch (e) {}
}

// the bubble shows only the latest line (the original, playful single-message
// form). The full back-and-forth is reviewable in the settings "대화내역" tab.
function latestDuckText(){
  for (let i = convo.length - 1; i >= 0; i--){ if (convo[i].role === "duck" && !convo[i].pending) return convo[i].text; }
  return "막힌 걸 말해봐.";
}

// renders the whole transcript into the 대화내역 tab (never the bubble)
function renderHistory(){
  if (!historyLog) return;
  historyLog.innerHTML = "";
  for (const m of convo){
    if (m.pending) continue;
    const el = document.createElement("div");
    el.className = "msg " + (m.role === "user" ? "user" : "duck");
    el.textContent = m.text;   // textContent, never innerHTML — LLM/user text stays inert
    historyLog.appendChild(el);
  }
  historyLog.scrollTop = historyLog.scrollHeight;
}

function openChat(){
  msgArea.textContent = latestDuckText();   // single latest line — original bubble form
  positionBubble();
  chatBubble.classList.add("open");
  scheduleAutoClose();   // start the idle auto-close countdown
  setTimeout(() => problem.focus(), 180);
}
function closeChat(){
  clearTimeout(autoCloseTimer); autoCloseTimer = null;
  chatBubble.classList.remove("open");
  setThoughtOpen(false);
  problem.blur();
}

// The chat no longer closes when you click elsewhere — instead it closes on its
// own once you stop interacting with it for `autoCloseSec` seconds (0 = never).
// Every interaction (typing, hovering/scrolling the bubble, a reply landing)
// restarts the countdown, so it never closes mid-read or mid-type. Tunable in settings.
let autoCloseSec = clampAutoClose(parseInt(localStorage.getItem("duckAutoCloseSec"), 10));
let autoCloseTimer = null;
function scheduleAutoClose(){
  clearTimeout(autoCloseTimer); autoCloseTimer = null;
  if (asking) return;                                   // never close while awaiting a reply
  if (!chatBubble.classList.contains("open")) return;
  if (!autoCloseSec || autoCloseSec <= 0) return;       // 0 / off = stay open indefinitely
  autoCloseTimer = setTimeout(closeChat, autoCloseSec * 1000);
}
// "대화 기록 초기화" (in the 대화내역 tab): wipe transcript + both context threads
function resetHistory(){
  if (asking) return;   // let any in-flight reply land first
  convo = [];
  sessionId = null;     // CLI session thread
  apiHistory = [];      // HTTP API replayed context
  saveConvo();
  renderHistory();
  msgArea.textContent = "막힌 걸 말해봐.";   // reset the bubble line too
  setThoughtOpen(false);
}
closeBtn.addEventListener("click", closeChat);
window.addEventListener("keydown", (e) => { if (e.key === "Escape" && chatBubble.classList.contains("open")) closeChat(); });

// Clicking elsewhere no longer dismisses the chat (per request) — the idle timer
// does. Interacting with the bubble or its link cloud restarts that countdown so
// it stays open while you're reading or typing.
["pointermove", "pointerdown", "keydown", "wheel"].forEach((ev) => {
  chatBubble.addEventListener(ev, scheduleAutoClose);
  thoughtBubble.addEventListener(ev, scheduleAutoClose);
});

let debounceT = null;
problem.addEventListener("input", () => {
  clearTimeout(debounceT);
  debounceT = setTimeout(() => {
    const text = problem.value.toLowerCase();
    if (!text.trim()){ setThoughtOpen(false); return; }
    const seen = new Set(); const matches = [];
    for (const k of KNOWLEDGE){
      if (seen.has(k.url)) continue;
      if (k.kws.some((w) => text.indexOf(w) !== -1)){ matches.push(k); seen.add(k.url); }
    }
    renderLinks(matches);
  }, 280);
});

// ── Coupon system (mobile-game style, adapted to a server-less local app) ─────
// Real games validate coupons on a SERVER: the code list and who-redeemed-what
// live in a DB the client can neither read nor forge, and one-time-per-account +
// expiry are enforced server-side. This app has no server, so we do the best a
// local app can: codes are stored only as salted SHA-256 hashes (no plaintext in
// this source, which ships to git), each redemption is tracked in localStorage,
// and one-time-vs-permanent + expiry are honored. Gap that needs a backend to
// truly close: a determined user could read the hash and brute-force a short
// code, or wipe localStorage to re-redeem a one-time code. Acceptable here —
// rewards are cosmetic (XP / skins), not money.
//
// To MINT a code, hash it (input is lowercased first), then add a row to COUPONS:
//   node -e "const c=require('crypto');console.log(c.createHash('sha256').update('malang-duck-v1:'+process.argv[1].toLowerCase()).digest('hex'))" YOURCODE
const COUPON_SALT = "malang-duck-v1";
// reusable:true = permanent (owner code, unlimited uses); false = one-time per install.
// reward: "unlock_all" | { xp: <number> }.  expires: "YYYY-MM-DD" or null (never).
const COUPONS = [
  { hash: "0adbf62aa25b57aba37ea687e40a818482deeabc4f7d3dad1575265f36ea20a2", reusable: true, reward: "unlock_all", expires: null },
  // 예시 이벤트 코드 (위 명령으로 해시 만들어 추가): 1회용 + XP 지급 + 만료일
  // { hash: "<sha256>", reusable: false, reward: { xp: 500 }, expires: "2026-12-31" },
];

// which one-time coupons this install already redeemed (permanent codes never recorded)
let redeemed = [];
try { const r = JSON.parse(localStorage.getItem("duckRedeemed") || "[]"); if (Array.isArray(r)) redeemed = r; } catch (e) { redeemed = []; }
function markRedeemed(hash){ if (!redeemed.includes(hash)){ redeemed.push(hash); try { localStorage.setItem("duckRedeemed", JSON.stringify(redeemed)); } catch (e) {} } }

async function couponHash(code){
  const data = new TextEncoder().encode(COUPON_SALT + ":" + code);
  const buf = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
}
function grantCouponReward(reward){
  if (reward === "unlock_all"){ unlockAllParts(); return "전부 해금 🎉"; }
  if (reward && typeof reward.xp === "number"){ addXP(reward.xp); return "+" + reward.xp + " XP 🎁"; }
  return "적용 완료";
}
// silent=true (fired while typing) applies a valid code but stays quiet on failure,
// so the hint doesn't flash "wrong code" on every keystroke; explicit apply/Enter
// (silent=false) reports exactly why a code didn't take (invalid / expired / used).
async function applyAdminCode(silent){
  const code = adminCodeInput.value.trim().toLowerCase();
  if (!code) return;
  const hash = await couponHash(code);
  const coupon = COUPONS.find((c) => c.hash === hash);
  if (!coupon){ if (!silent) setAdminHint("쿠폰 코드가 올바르지 않아요.", true); return; }
  if (coupon.expires && new Date() > new Date(coupon.expires + "T23:59:59")){ if (!silent) setAdminHint("만료된 쿠폰이에요.", true); return; }
  if (!coupon.reusable && redeemed.includes(coupon.hash)){ if (!silent) setAdminHint("이미 사용한 쿠폰이에요.", true); return; }
  const msg = grantCouponReward(coupon.reward);
  if (!coupon.reusable) markRedeemed(coupon.hash);
  adminCodeInput.value = "";
  setAdminHint("쿠폰 적용 완료! " + msg, false);
}

  if (b.dataset.tab === "history") renderHistory();
}));

function refreshWardrobeUI(){
  xpBadge.textContent = totalXP + " XP";
  renderDuck(previewSvg, buildDuckStyle(), false);

  equipmentSlotsLeft.innerHTML = "";
  equipmentSlotsRight.innerHTML = "";
  const completed = wardrobeTracks.filter((def) => trackLevel(def, partOf(def.id)) >= trackMax(def)).length;
  equipmentCount.textContent = completed + "/" + wardrobeTracks.length + " 완료";

  const splitAt = Math.ceil(wardrobeTracks.length / 2);
  wardrobeTracks.forEach((def, i) => {
    const st = partOf(def.id);
    const max = trackMax(def);
    st.level = clamp(Number(st.level) || 0, 0, max);
    st.shapeIdx = clamp(Number(st.shapeIdx) || 0, 0, st.level);
    st.colorIdx = clamp(Number(st.colorIdx) || 0, 0, st.level);

    const slotBtn = document.createElement("button");
    slotBtn.className = "equipmentSlot" + (def.id === selectedTrackId ? " selected" : "");
    const equipped = def.skins[st.shapeIdx] || def.skins[0];
    slotBtn.title = def.label + " · " + equipped.label;
    slotBtn.innerHTML = "<span class=\"slotIcon\">" + (equipped.icon || def.slotIcon || "■") + "</span><span class=\"slotName\">" + def.label + "</span><span class=\"slotLevel\">Lv." + st.level + "/" + max + "</span>";
    slotBtn.addEventListener("click", () => { selectedTrackId = def.id; refreshWardrobeUI(); });
    (i < splitAt ? equipmentSlotsLeft : equipmentSlotsRight).appendChild(slotBtn);
  });

  const def = wardrobeTracks.find((t) => t.id === selectedTrackId) || wardrobeTracks[0];
  const st = partOf(def.id);
  const max = trackMax(def);
  equipmentDetail.innerHTML = "<div id=\"equipmentDetailHead\"><strong>" + def.label + "</strong><span>Lv." + st.level + "/" + max + "</span></div><div class=\"equipmentSectionLabel\">스킨</div><div id=\"skinChoiceGrid\"></div><div class=\"equipmentSectionLabel\">색상</div><div id=\"equipmentColorRow\"></div>";

  const skinGrid = equipmentDetail.querySelector("#skinChoiceGrid");
  def.skins.forEach((sk, i) => {
    const choice = document.createElement("button");
    const locked = i > st.level;
    choice.className = "skinChoice" + (i === st.shapeIdx ? " selected" : "") + (locked ? " locked" : "");
    choice.innerHTML = "<span class=\"skinIcon\">" + (locked ? "?" : (sk.icon || "■")) + "</span><span>" + (locked ? "미해금" : sk.label) + "</span>";
    choice.disabled = locked;
    if (!locked) choice.addEventListener("click", () => { st.shapeIdx = i; saveWardrobeState(); rebuildDuck(); refreshWardrobeUI(); });
    skinGrid.appendChild(choice);
  });

  const colorRow = equipmentDetail.querySelector("#equipmentColorRow");
  for (let i = 0; i <= st.level; i++){
    const sw = document.createElement("button");
    sw.className = "colorSwatch" + (i === st.colorIdx ? " selected" : "");
    sw.title = i === 0 ? "원래 색" : "해금 색상 " + i;
    sw.style.background = hexCss(colorForChoice(def, i));
    sw.addEventListener("click", () => { st.colorIdx = i; saveWardrobeState(); rebuildDuck(); refreshWardrobeUI(); });
    colorRow.appendChild(sw);
  }

  const btn = document.createElement("button");
  if (st.level >= max){
    btn.className = "unlockBtn maxed";
    btn.textContent = "이 부위 완료";
    btn.disabled = true;
  } else {
    const cost = costForLevel(st.level + 1);
    btn.className = "unlockBtn";
    btn.textContent = "다음 스킨 해금 (" + cost + " XP)";
    btn.disabled = totalXP < cost;
    btn.addEventListener("click", () => {
      if (totalXP < cost) return;
      totalXP -= cost;
      localStorage.setItem("duckXP", String(totalXP));
      xpHud.textContent = "✨ " + totalXP + " XP";
      st.level += 1;
      st.shapeIdx = st.level;
      saveWardrobeState();
      rebuildDuck();
      refreshWardrobeUI();
      celebrateLevelUp(def.label);
    });
  }
  equipmentDetail.appendChild(btn);

  const unlocked = allTracksMaxed();
  codePanel.style.display = unlocked ? "flex" : "none";
  codePanel.classList.toggle("locked", !unlocked);
  codeStatus.textContent = unlocked ? "최종 해금: JSON으로 오리 색상 팔레트를 조합할 수 있습니다." : "모든 스킨 트랙을 완료하면 열립니다.";
  duckCodeArea.disabled = !unlocked;
  applyDuckCodeBtn.disabled = !unlocked;
  loadDuckCodeBtn.disabled = !unlocked;
  if (unlocked && !duckCodeValue.trim()) duckCodeArea.value = JSON.stringify(SKIN_TEMPLATE, null, 2);
}

function saveDuckCode(text){
  duckCodeValue = text.trim();
  localStorage.setItem("duckCode", duckCodeValue);
}

function applyDuckCode(){
  if (!allTracksMaxed()) return;
  const text = duckCodeArea.value.trim();
  if (!text){ saveDuckCode(""); rebuildDuck(); refreshWardrobeUI(); return; }
  try{
    JSON.parse(text);
    saveDuckCode(text);
    rebuildDuck();
    refreshWardrobeUI();
    codeStatus.textContent = "오리 코드를 적용했습니다.";
  } catch (e){
    codeStatus.textContent = "JSON 형식 오류: " + ((e && e.message) || e);
  }
}
loadDuckCodeBtn.addEventListener("click", () => {
  if (!allTracksMaxed()) return;
  duckCodeArea.value = JSON.stringify(SKIN_TEMPLATE, null, 2);
});
applyDuckCodeBtn.addEventListener("click", applyDuckCode);
duckCodeArea.addEventListener("input", () => {
  if (allTracksMaxed()) codeStatus.textContent = "오리 코드를 편집 중입니다...";
});

duckHit.addEventListener("contextmenu", (e) => { e.preventDefault(); openSettings(); });

async function askDuck(){
  const text = problem.value.trim();
  if (!text || asking) return;
  asking = true;
  problem.value = "";
  convo.push({ role: "user", text });
  const pending = { role: "duck", text: "음... 잠깐만.", pending: true };
  convo.push(pending);
  msgArea.textContent = pending.text;   // bubble shows just "음... 잠깐만."
  saveConvo();
  addXP(1);

  const pkind = (PROVIDER_MAP[provider] || PROVIDER_MAP.claude).kind;
  const askPayload = { provider, text, systemPrompt: customPrompt };
  if (pkind === "cli") askPayload.sessionId = sessionId;   // local CLIs resume by id
  else askPayload.history = apiHistory;                    // HTTP APIs replay the transcript

  let result = null, threw = false;
  try {
    result = await window.duckAPI.ask(askPayload);
  } catch (e) {
    threw = true;
  }
  asking = false;

  // if 새 대화 wiped the transcript while the request was in flight, this reply
  // is now orphaned — drop it rather than splicing into a fresh conversation.
  const idx = convo.indexOf(pending);
  if (idx === -1) return;
  convo.splice(idx, 1);

  if (threw) {
    convo.push({ role: "duck", text: "연결이 잠깐 끊겼나봐." });
  } else if (result && result.error) {
    const tip = pkind === "cli" ? "로그인 상태인지 확인해봐" : "API 키·모델·연결 주소를 확인해봐";
    convo.push({ role: "duck", text: "지금은 대답을 못 들었어. (" + tip + ")" });
  } else {
    const note = (result && result.note) || "음, 조금 더 자세히 말해줄래?";
    convo.push({ role: "duck", text: note });
    renderLinks((result && result.links) || []);
    if (pkind === "cli") {
      sessionId = (result && result.sessionId) || sessionId;   // thread the CLI session
    } else {
      // keep the API transcript so the next turn has context (bounded)
      apiHistory.push({ role: "user", content: text }, { role: "assistant", content: note });
      if (apiHistory.length > 40) apiHistory = apiHistory.slice(-40);
    }
  }
  msgArea.textContent = latestDuckText();   // show the reply as the single bubble line
  saveConvo();
  renderHistory();       // keep the 대화내역 tab fresh if it's open
  scheduleAutoClose();   // reply landed — restart the idle auto-close countdown
  requestAnimationFrame(() => { if (chatBubble.classList.contains("open")) positionBubble(); });
}
problem.addEventListener("keydown", (e) => {
  if (e.key === "Enter"){ e.preventDefault(); askDuck(); }
});

document.getElementById("quitBtn").addEventListener("click", () => window.duckAPI.quit());

// everything above is now declared — safe to draw the duck and start the loop
rebuildDuck();
requestAnimationFrame(physicsFrame);
</script>
